# See https://pre-commit.com for more information
# Install with: make install_precommit_hooks

# Vendored third-party assets are excluded from every hook. Their bytes are
# verified against npm-published hashes (scripts/vendor_assets.py, PR 4), so a
# whitespace fixer "helpfully" rewriting one would break that verification --
# and the soundfont/JS bundles legitimately exceed the large-file limit.
exclude: ^app/static/vendor/

repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: check-yaml
          - id: check-toml
          - id: check-added-large-files
          - id: check-merge-conflict
          - id: detect-private-key
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.15.22
      hooks:
          - id: ruff-check
            args: [--fix]
          - id: ruff-format
